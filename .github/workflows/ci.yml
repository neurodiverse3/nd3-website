name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_STRAPI_API_URL: http://127.0.0.1:1337
          STRAPI_API_TOKEN: ci-placeholder-token
          RESEND_API_KEY: ci-placeholder-resend-key
        run: npm run build
